name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore FoodSafetyInspectionTracker.Tests/FoodSafetyInspectionTracker.Tests.csproj
      - name: Build
        run: dotnet build FoodSafetyInspectionTracker.Tests/FoodSafetyInspectionTracker.Tests.csproj --configuration Release --no-restore
      - name: Test
        run: dotnet test FoodSafetyInspectionTracker.Tests/FoodSafetyInspectionTracker.Tests.csproj --configuration Release --no-build
